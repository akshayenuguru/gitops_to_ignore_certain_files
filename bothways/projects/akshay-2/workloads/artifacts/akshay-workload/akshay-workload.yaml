apiVersion: apps/v1
kind: Deployment
metadata:
  name: akshay-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: akshay-nginx
  template:
    metadata:
      labels:
        app: akshay-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

